<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="512" height="512" fill="#F5EDD8"/>

  <!-- Circular refresh arrows -->
  <!-- Left arc: counterclockwise, goes down the left side -->
  <path d="M 210 95 A 136 140 0 0 0 210 373"
        fill="none" stroke="#9DCCE0" stroke-width="16" stroke-linecap="square"/>
  <!-- Arrowhead at bottom of left arc pointing downward -->
  <polygon points="196,369 224,369 210,396" fill="#9DCCE0"/>

  <!-- Right arc: clockwise, goes up the right side -->
  <path d="M 302 373 A 136 140 0 0 1 302 95"
        fill="none" stroke="#9DCCE0" stroke-width="16" stroke-linecap="square"/>
  <!-- Arrowhead at top of right arc pointing upward -->
  <polygon points="288,99 316,99 302,72" fill="#9DCCE0"/>

  <!-- BANDANA / CAP -->
  <!-- Stepped pixel-art top rows -->
  <rect x="224" y="64"  width="64"  height="16" fill="#1C3282"/>
  <rect x="208" y="80"  width="96"  height="16" fill="#1C3282"/>
  <rect x="192" y="96"  width="128" height="16" fill="#1C3282"/>
  <rect x="176" y="112" width="160" height="16" fill="#1C3282"/>
  <!-- Cap body -->
  <rect x="176" y="128" width="160" height="30" fill="#1C3282"/>
  <!-- Lighter highlight band across front of bandana -->
  <rect x="168" y="138" width="176" height="18" fill="#506AD8"/>
  <!-- Lower cap edge -->
  <rect x="176" y="156" width="160" height="18" fill="#1C3282"/>

  <!-- Bandana knot/bow on LEFT side -->
  <rect x="130" y="124" width="46" height="18" fill="#1C3282"/>
  <rect x="112" y="134" width="38" height="16" fill="#142870"/>
  <rect x="118" y="122" width="20" height="30" fill="#243896"/>
  <rect x="112" y="128" width="18" height="12" fill="#1C3282"/>
  <rect x="112" y="150" width="18" height="12" fill="#1C3282"/>

  <!-- FACE (blank white) -->
  <rect x="196" y="174" width="120" height="16" fill="#FFFFFF"/>
  <rect x="160" y="190" width="192" height="16" fill="#FFFFFF"/>
  <rect x="160" y="206" width="192" height="16" fill="#FFFFFF"/>
  <rect x="160" y="222" width="192" height="16" fill="#FFFFFF"/>
  <rect x="160" y="238" width="192" height="16" fill="#FFFFFF"/>
  <rect x="176" y="254" width="160" height="16" fill="#FFFFFF"/>
  <rect x="192" y="270" width="128" height="16" fill="#FFFFFF"/>
  <rect x="208" y="286" width="96"  height="16" fill="#FFFFFF"/>
  <rect x="220" y="302" width="72"  height="16" fill="#FFFFFF"/>

  <!-- Ear pieces (blue) -->
  <rect x="144" y="194" width="16" height="48" fill="#2A50B8"/>
  <rect x="352" y="194" width="16" height="48" fill="#2A50B8"/>

  <!-- BODY -->
  <!-- Neck -->
  <rect x="224" y="318" width="64" height="14" fill="#1C3282"/>
  <!-- Jacket rows: blue sides + white center panel -->
  <rect x="176" y="332" width="160" height="16" fill="#1C3282"/>
  <rect x="208" y="332" width="96"  height="16" fill="#FFFFFF"/>
  <rect x="160" y="348" width="192" height="16" fill="#1C3282"/>
  <rect x="208" y="348" width="96"  height="16" fill="#FFFFFF"/>
  <rect x="160" y="364" width="192" height="16" fill="#1C3282"/>
  <rect x="208" y="364" width="96"  height="16" fill="#FFFFFF"/>
  <rect x="160" y="380" width="192" height="16" fill="#1C3282"/>
  <rect x="208" y="380" width="96"  height="16" fill="#FFFFFF"/>

  <!-- Yellow V-collar (pixel art staircase) -->
  <rect x="220" y="318" width="14" height="14" fill="#F5C235"/>
  <rect x="228" y="328" width="14" height="14" fill="#F5C235"/>
  <rect x="236" y="338" width="14" height="14" fill="#F5C235"/>
  <rect x="244" y="348" width="14" height="14" fill="#F5C235"/>
  <rect x="278" y="318" width="14" height="14" fill="#F5C235"/>
  <rect x="270" y="328" width="14" height="14" fill="#F5C235"/>
  <rect x="262" y="338" width="14" height="14" fill="#F5C235"/>
  <rect x="254" y="348" width="14" height="14" fill="#F5C235"/>

  <!-- BOTTOM WORKFLOW ICONS -->

  <!-- GEAR ICON (centered ~x=102) -->
  <rect x="64"  y="422" width="76" height="24" fill="#1C3282"/>
  <rect x="90"  y="396" width="24" height="76" fill="#1C3282"/>
  <rect x="74"  y="408" width="56" height="56" fill="#1C3282"/>
  <rect x="90"  y="424" width="24" height="24" fill="#F5EDD8"/>

  <!-- Arrow: gear to doc -->
  <rect x="152" y="428" width="38" height="12" fill="#9DCCE0"/>
  <polygon points="190,420 214,434 190,448" fill="#9DCCE0"/>

  <!-- DOCUMENT ICON (x=222-298, y=400-488) -->
  <rect x="222" y="400" width="76" height="88" fill="#2649BC"/>
  <polygon points="276,400 298,400 298,424" fill="#1C3282"/>
  <polygon points="276,400 276,424 298,424" fill="#4A6CD4"/>
  <rect x="234" y="432" width="50" height="8" fill="#9DCCE0"/>
  <rect x="234" y="446" width="50" height="8" fill="#9DCCE0"/>
  <rect x="234" y="460" width="36" height="8" fill="#9DCCE0"/>

  <!-- Arrow: doc to checkmark -->
  <rect x="310" y="428" width="38" height="12" fill="#9DCCE0"/>
  <polygon points="348,420 372,434 348,448" fill="#9DCCE0"/>

  <!-- CHECKMARK BOX (x=380-462, y=396-478) -->
  <rect x="380" y="396" width="82" height="82" fill="#2649BC"/>
  <!-- Checkmark: left arm down-right, then right arm up-right -->
  <rect x="394" y="428" width="14" height="14" fill="#9DCCE0"/>
  <rect x="404" y="440" width="14" height="14" fill="#9DCCE0"/>
  <rect x="414" y="452" width="14" height="14" fill="#9DCCE0"/>
  <rect x="426" y="438" width="14" height="14" fill="#9DCCE0"/>
  <rect x="438" y="422" width="14" height="14" fill="#9DCCE0"/>
  <rect x="450" y="408" width="14" height="14" fill="#9DCCE0"/>
</svg>
