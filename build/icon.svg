<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1E2D3D"/>

  <!-- Hair (dark, peeking under bandana) -->
  <ellipse cx="256" cy="240" rx="112" ry="125" fill="#2C1810"/>

  <!-- Head/face -->
  <ellipse cx="256" cy="285" rx="108" ry="115" fill="#F5C99A"/>

  <!-- Bandana cloth covering top of head -->
  <path d="M 152 232 Q 170 148 256 138 Q 342 148 360 232 Q 310 210 256 207 Q 202 210 152 232 Z"
        fill="#E8892B"/>
  <!-- Bandana texture fold lines -->
  <path d="M 170 222 Q 256 198 342 222" stroke="#C0701A" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 178 210 Q 256 188 334 210" stroke="#C0701A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Bandana headband strip across forehead -->
  <path d="M 152 232 Q 256 215 360 232 L 355 255 Q 256 237 157 255 Z"
        fill="#D4771F"/>

  <!-- Bandana knot bow on right side (distinctive feature) -->
  <!-- Left wing of bow -->
  <path d="M 350 238 Q 372 222 385 232 Q 378 244 360 248 Z" fill="#E8892B"/>
  <!-- Right wing of bow -->
  <path d="M 350 238 Q 378 228 392 242 Q 384 254 365 252 Z" fill="#C0701A"/>
  <!-- Center knot -->
  <ellipse cx="358" cy="244" rx="10" ry="9" fill="#E8892B"/>
  <!-- Tail of bandana -->
  <path d="M 358 253 Q 368 268 362 282 Q 356 278 352 265 Z" fill="#C0701A"/>

  <!-- Ears -->
  <ellipse cx="148" cy="292" rx="16" ry="22" fill="#F5C99A"/>
  <ellipse cx="364" cy="292" rx="16" ry="22" fill="#F5C99A"/>
  <!-- Inner ear -->
  <ellipse cx="148" cy="292" rx="9" ry="13" fill="#E8A87A" opacity="0.5"/>
  <ellipse cx="364" cy="292" rx="9" ry="13" fill="#E8A87A" opacity="0.5"/>

  <!-- Eyes -->
  <ellipse cx="220" cy="282" rx="15" ry="17" fill="#2C1810"/>
  <ellipse cx="292" cy="282" rx="15" ry="17" fill="#2C1810"/>
  <!-- Eye shine -->
  <ellipse cx="226" cy="276" rx="5" ry="5" fill="white"/>
  <ellipse cx="298" cy="276" rx="5" ry="5" fill="white"/>

  <!-- Eyebrows (slightly raised, friendly) -->
  <path d="M 205 260 Q 222 252 240 258" stroke="#2C1810" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 272 258 Q 290 252 307 260" stroke="#2C1810" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="256" cy="310" rx="10" ry="7" fill="#E0A870" opacity="0.5"/>

  <!-- Smile (friendly confidence) -->
  <path d="M 220 338 Q 256 364 292 338" stroke="#2C1810" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="195" cy="325" rx="20" ry="12" fill="#F0A070" opacity="0.35"/>
  <ellipse cx="317" cy="325" rx="20" ry="12" fill="#F0A070" opacity="0.35"/>
</svg>
